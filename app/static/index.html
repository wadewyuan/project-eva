<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eva - 虚拟情感陪伴助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f5f5;
  height: 100vh;
  height: 100dvh;
  display: flex;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #fff;
  border-right: 1px solid #e0e0e0;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid #e0e0e0;
}
.sidebar-header h1 {
  font-size: 18px;
  color: #333;
}
.sidebar-header p {
  font-size: 12px;
  color: #999;
  margin-top: 4px;
}
.nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.nav-item {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 14px;
  color: #555;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.nav-item:hover {
  background: #f0f0f0;
}
.nav-item.active {
  background: #e8f4fd;
  border-left-color: #2196F3;
  color: #1976D2;
}
.nav-item .label {
  font-size: 12px;
  color: #999;
  margin-top: 2px;
}
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid #e0e0e0;
  font-size: 12px;
  color: #999;
}

/* Main chat area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.chat-header {
  padding: 12px 20px;
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.chat-header .title {
  font-size: 15px;
  font-weight: 500;
  color: #333;
}
.chat-header .tone-badge {
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 12px;
  background: #e3f2fd;
  color: #1976D2;
  white-space: nowrap;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.message {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user {
  align-self: flex-end;
  background: #2196F3;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant {
  align-self: flex-start;
  background: #fff;
  color: #333;
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}
.message.assistant.streaming {
  background: #fafafa;
}
.input-area {
  padding: 12px 20px 16px;
  background: #fff;
  border-top: 1px solid #e0e0e0;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.input-area textarea {
  flex: 1;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  resize: none;
  outline: none;
  font-family: inherit;
  line-height: 1.5;
  max-height: 120px;
}
.input-area textarea:focus {
  border-color: #2196F3;
}
.input-area button {
  padding: 10px 20px;
  background: #2196F3;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.input-area button:hover {
  background: #1976D2;
}
.input-area button:disabled {
  background: #ccc;
  cursor: not-allowed;
}
.input-area .voice-btn {
  width: 40px;
  height: 40px;
  padding: 0;
  border-radius: 50%;
  border: none;
  background: #e8e8e8;
  color: #555;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.input-area .voice-btn:hover {
  background: #d0d0d0;
}
.input-area .voice-btn.recording {
  background: #e53935;
  color: #fff;
  animation: pulse 1.2s infinite;
}
.input-area .voice-btn.seamless {
  background: #4caf50;
  color: #fff;
}
.input-area .voice-btn.listening {
  animation: breathe 2.5s infinite;
}
@keyframes breathe {
  0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.45); }
  50% { box-shadow: 0 0 0 10px rgba(76,175,80,0); }
  100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(229,57,53,0.5); }
  70% { box-shadow: 0 0 0 10px rgba(229,57,53,0); }
  100% { box-shadow: 0 0 0 0 rgba(229,57,53,0); }
}
.msg-play-btn {
  position: absolute;
  bottom: 4px;
  right: 8px;
  width: 22px;
  height: 22px;
  padding: 0;
  background: none;
  border: none;
  color: #bbb;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s;
}
.msg-play-btn:hover {
  color: #2196F3;
}
.msg-play-btn.playing {
  color: #2196F3;
}
.message.assistant {
  position: relative;
  padding-bottom: 26px;
}
.auto-play-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: #666;
  cursor: pointer;
  user-select: none;
}
.auto-play-toggle input {
  cursor: pointer;
}

/* Memories panel */
.memories-panel {
  width: 280px;
  background: #fff;
  border-left: 1px solid #e0e0e0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.memories-panel.hidden {
  display: none;
}
.memories-header {
  padding: 12px 16px;
  border-bottom: 1px solid #e0e0e0;
  font-size: 15px;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.memories-header button {
  font-size: 12px;
  background: none;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 2px 8px;
  cursor: pointer;
  color: #666;
}
.mobile-close-btn {
  display: none;
}
.memories-header button:hover {
  background: #f0f0f0;
}
.memories-header .danger-btn {
  color: #e53935;
  border-color: #ef9a9a;
}
.memories-header .danger-btn:hover {
  background: #ffebee;
}

/* Confirm dialog */
.dialog-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.dialog-overlay.active {
  display: flex;
}
.dialog-box {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 360px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.dialog-box h3 {
  font-size: 16px;
  margin-bottom: 8px;
  color: #333;
}
.dialog-box p {
  font-size: 14px;
  color: #666;
  line-height: 1.5;
  margin-bottom: 20px;
}
.dialog-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.dialog-actions button {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  border: none;
}
.dialog-actions .btn-cancel {
  background: #f0f0f0;
  color: #555;
}
.dialog-actions .btn-confirm {
  background: #e53935;
  color: #fff;
}
.memories-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.memory-item {
  padding: 8px 16px;
  font-size: 13px;
  color: #555;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.memory-item .memory-content {
  flex: 1;
  min-width: 0;
}
.memory-item .fact {
  color: #333;
}
.memory-item .meta {
  font-size: 11px;
  color: #999;
  margin-top: 2px;
}
.memory-item .del-btn {
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 0 2px;
  transition: color 0.15s;
  flex-shrink: 0;
}
.memory-item .del-btn:hover {
  color: #e53935;
}
.empty-state {
  text-align: center;
  color: #999;
  font-size: 13px;
  padding: 40px 20px;
}
.toggle-btn {
  font-size: 12px;
  background: none;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 4px 10px;
  cursor: pointer;
  color: #666;
}

/* Hamburger menu (hidden on desktop) */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 4px;
  padding: 6px;
  cursor: pointer;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: #666;
  border-radius: 1px;
}

/* Sidebar overlay on mobile */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
}
.sidebar-overlay.active {
  display: block;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 101;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    box-shadow: 2px 0 8px rgba(0,0,0,0.1);
  }
  .sidebar.open {
    transform: translateX(0);
  }

  .hamburger {
    display: flex;
  }

  .chat-header {
    padding: 10px 12px;
  }
  .chat-header .title {
    font-size: 14px;
  }

  .messages {
    padding: 12px;
    gap: 10px;
  }
  .message {
    max-width: 82%;
    padding: 8px 12px;
    font-size: 15px;
    line-height: 1.55;
  }

  .input-area {
    padding: 8px 12px 12px;
    gap: 8px;
  }
  .input-area textarea {
    padding: 8px 10px;
    font-size: 15px;
  }
  .input-area button {
    padding: 8px 14px;
    font-size: 14px;
  }
  .input-area .voice-btn {
    width: 36px;
    height: 36px;
    padding: 0;
  }

  .memories-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    z-index: 102;
    width: 80%;
    max-width: 300px;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    box-shadow: -2px 0 8px rgba(0,0,0,0.1);
    display: flex !important;
  }
  .memories-panel.open {
    transform: translateX(0);
    pointer-events: auto;
  }
  .memories-panel.hidden {
    transform: translateX(100%);
    pointer-events: none;
  }

  .mobile-close-btn {
    display: inline-block;
  }

  .sidebar-footer {
    display: none;
  }
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Eva</h1>
    <p>虚拟情感陪伴助手</p>
  </div>
  <div class="nav">
    <div class="nav-item active" onclick="switchTab('chat')">
      对话
      <div class="label">开始新对话</div>
    </div>
    <div class="nav-item" onclick="switchTab('memories')">
      记忆
      <div class="label">AI 记住的事</div>
    </div>
  </div>
  <div class="sidebar-footer">
    快捷键: Enter 发送, Shift+Enter 换行
  </div>
</div>

<div class="main">
  <div class="chat-header">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="hamburger" onclick="openSidebar()">
        <span></span><span></span><span></span>
      </button>
      <span class="title">小夏</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="tone-badge" id="toneBadge" style="display:none">默认</span>
      <label class="auto-play-toggle" title="AI 回复后自动朗读">
        <input type="checkbox" id="autoPlayToggle" onchange="saveAutoPlaySetting()">
        <span>自动朗读</span>
      </label>
      <label class="auto-play-toggle" title="检测到语音自动输入">
        <input type="checkbox" id="seamlessVoiceToggle" onchange="toggleSeamlessVoice()">
        <span>连续语音</span>
      </label>
      <button class="toggle-btn" onclick="toggleMemories()">记忆</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <button id="micBtn" class="voice-btn" onclick="toggleRecording()" title="语音输入">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
    </button>
    <textarea id="input" rows="2" placeholder="说点什么..." onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<div class="memories-panel hidden" id="memoriesPanel">
  <div class="memories-header">
    长期记忆
    <div style="display:flex;gap:6px">
      <button class="mobile-close-btn" onclick="toggleMemories()">×</button>
      <button onclick="refreshMemories()">刷新</button>
      <button class="danger-btn" onclick="confirmClearMemories()">清除全部</button>
    </div>
  </div>
  <div class="memories-list" id="memoriesList">
    <div class="empty-state">暂无记忆</div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="dialog-overlay" id="confirmDialog">
  <div class="dialog-box">
    <h3>清除全部记忆？</h3>
    <p>这会把 AI 记住的所有关于你的事都删掉，无法恢复。确定吗？</p>
    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeConfirmDialog()">取消</button>
      <button class="btn-confirm" onclick="doClearMemories()">确定清除</button>
    </div>
  </div>
</div>

<script>
let sessionId = null;
let isStreaming = false;

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  closeSidebar();
  if (tab === 'memories') {
    toggleMemories();
  }
}

function toggleMemories() {
  const panel = document.getElementById('memoriesPanel');
  panel.classList.toggle('hidden');
  panel.classList.toggle('open');
  refreshMemories();
}

function appendMessage(role, content) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const textDiv = document.createElement('div');
  textDiv.className = 'msg-text';
  textDiv.textContent = content;
  div.appendChild(textDiv);

  if (role === 'assistant' || role === 'assistant streaming') {
    const playBtn = document.createElement('button');
    playBtn.className = 'msg-play-btn';
    playBtn.title = '朗读';
    playBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg>';
    playBtn.onclick = function () {
      const text = this.parentElement.querySelector('.msg-text').textContent;
      playManual(text, this);
    };
    div.appendChild(playBtn);
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function updateStreamingMessage(el, content) {
  const textEl = el.querySelector('.msg-text');
  if (textEl) textEl.textContent = content;
  const container = document.getElementById('messages');
  container.scrollTop = container.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  appendMessage('user', text);
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const assistantEl = appendMessage('assistant streaming', '');
  let fullReply = '';
  const autoPlay = document.getElementById('autoPlayToggle').checked;
  ttsBuffer = '';
  if (autoPlay) autoPlayTargetBtn = assistantEl.querySelector('.msg-play-btn');

  try {
    const res = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'token') {
            fullReply += data.data;
            updateStreamingMessage(assistantEl, fullReply);
            if (autoPlay) {
              ttsBuffer += data.data;
              tryFlushTTSBuffer();
            }
          } else if (data.type === 'done') {
            sessionId = data.session_id;
            const badge = document.getElementById('toneBadge');
            badge.textContent = data.tone_detected || '默认';
            badge.style.display = 'inline';
            assistantEl.classList.remove('streaming');
            refreshMemories();
            if (autoPlay && ttsBuffer.trim()) {
              const seg = stripEmoji(ttsBuffer);
              if (seg) ttsTextQueue.push(seg);
              ttsBuffer = '';
              processTTSPipeline();
            }
          }
        } catch (e) {}
      }
    }
  } catch (err) {
    const textEl = assistantEl.querySelector('.msg-text');
    if (textEl) textEl.textContent = '出错啦，请重试';
    assistantEl.classList.remove('streaming');
  }

  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
}

async function refreshMemories() {
  try {
    const res = await fetch('/memories');
    const memories = await res.json();
    const container = document.getElementById('memoriesList');
    if (memories.length === 0) {
      container.innerHTML = '<div class="empty-state">暂无记忆</div>';
      return;
    }
    container.innerHTML = memories.map(m => `
      <div class="memory-item">
        <div class="memory-content">
          <div class="fact">${m.fact_text}</div>
          <div class="meta">${m.category} · ${new Date(m.created_at).toLocaleString()}</div>
        </div>
        <button class="del-btn" onclick="deleteMemory(${m.id})" title="删除">×</button>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('memoriesList').innerHTML = '<div class="empty-state">加载失败</div>';
  }
}

function confirmClearMemories() {
  document.getElementById('confirmDialog').classList.add('active');
}

function closeConfirmDialog() {
  document.getElementById('confirmDialog').classList.remove('active');
}

async function doClearMemories() {
  closeConfirmDialog();
  try {
    const res = await fetch('/memories', { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
      refreshMemories();
    }
  } catch (err) {
    alert('清除失败，请重试');
  }
}

async function deleteMemory(id) {
  if (!confirm('确定删除这条记忆？')) return;
  try {
    const res = await fetch(`/memories/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
      refreshMemories();
    }
  } catch (err) {
    alert('删除失败，请重试');
  }
}

// ---------- Voice ----------

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let currentAudio = null;
let currentPlayingBtn = null;

// Seamless voice mode (raw PCM streaming)
let seamlessMode = false;
let vadAudioContext = null;
let vadAnalyser = null;
let vadStream = null;
let vadInterval = null;
let vadIsSpeech = false;
let vadSilenceStart = null;

let pcmAudioContext = null;
let pcmProcessor = null;
let pcmSource = null;
let pcmBuffer = new Float32Array(0);
let pcmChunkTimer = null;

// WebSocket streaming ASR state
let streamWs = null;
let streamPrefix = '';
let streamIsFinalizing = false;

const VAD_THRESHOLD = 0.018;
const SILENCE_TIMEOUT = 3000;
const CHUNK_MS = 500;
const TARGET_SR = 16000;
const VAD_POLL_MS = 50;

function resampleLinear(input, srcSr, dstSr) {
  if (srcSr === dstSr) return input;
  const ratio = dstSr / srcSr;
  const outLen = Math.max(0, Math.round(input.length * ratio));
  const out = new Float32Array(outLen);
  for (let i = 0; i < outLen; i++) {
    const x = i / ratio;
    const x0 = Math.floor(x);
    const x1 = Math.min(x0 + 1, input.length - 1);
    const t = x - x0;
    out[i] = input[x0] * (1 - t) + input[x1] * t;
  }
  return out;
}

function concatFloat32(a, b) {
  const out = new Float32Array(a.length + b.length);
  out.set(a, 0);
  out.set(b, a.length);
  return out;
}

function float32ToPCM16(float32Array) {
  const pcm16 = new Int16Array(float32Array.length);
  for (let i = 0; i < float32Array.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Array[i]));
    pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return pcm16.buffer;
}

// Streamed TTS pipeline: text -> [synthesize] -> audio -> [play]
let ttsBuffer = '';
let ttsTextQueue = [];
let ttsAudioQueue = [];
let ttsIsSynthesizing = false;
let ttsIsPlaying = false;
let autoPlayTargetBtn = null;
let ttsAudioContext = null;
let ttsNextStartTime = 0;
let ttsActiveSources = [];

const SENTENCE_END_RE = /[。！？.!?…]+/;
const TTS_MIN_SEGMENT = 20;
const TTS_MAX_SEGMENT = 80;
const EMOJI_RE = /[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu;

function stripEmoji(text) {
  return text.replace(EMOJI_RE, '').trim();
}

function getTTSAudioContext() {
  if (!ttsAudioContext) {
    ttsAudioContext = new AudioContext();
  }
  if (ttsAudioContext.state === 'suspended') {
    ttsAudioContext.resume();
  }
  return ttsAudioContext;
}

function stopCurrentAudio() {
  for (const s of ttsActiveSources) {
    try { s.stop(); } catch (e) {}
  }
  ttsActiveSources = [];
  ttsNextStartTime = 0;
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.onended = null;
    currentAudio.onerror = null;
    currentAudio = null;
  }
  ttsAudioQueue = [];
  ttsTextQueue = [];
  ttsIsPlaying = false;
  ttsIsSynthesizing = false;
  ttsBuffer = '';
  vadLastTtsEnd = Date.now();
  if (currentPlayingBtn) {
    currentPlayingBtn.classList.remove('playing');
    currentPlayingBtn = null;
  }
  if (autoPlayTargetBtn) {
    autoPlayTargetBtn.classList.remove('playing');
    autoPlayTargetBtn = null;
  }
}

function tryFlushTTSBuffer() {
  while (ttsBuffer.length >= TTS_MIN_SEGMENT) {
    const match = ttsBuffer.match(SENTENCE_END_RE);
    if (match) {
      const end = match.index + match[0].length;
      const seg = stripEmoji(ttsBuffer.slice(0, end));
      ttsBuffer = ttsBuffer.slice(end).trimStart();
      if (seg) { ttsTextQueue.push(seg); processTTSPipeline(); }
    } else if (ttsBuffer.length > TTS_MAX_SEGMENT) {
      let cut = ttsBuffer.lastIndexOf('，', TTS_MAX_SEGMENT);
      if (cut < TTS_MIN_SEGMENT) cut = ttsBuffer.lastIndexOf('、', TTS_MAX_SEGMENT);
      if (cut < TTS_MIN_SEGMENT) cut = ttsBuffer.lastIndexOf(' ', TTS_MAX_SEGMENT);
      if (cut < TTS_MIN_SEGMENT) cut = TTS_MAX_SEGMENT;
      const seg = stripEmoji(ttsBuffer.slice(0, cut));
      ttsBuffer = ttsBuffer.slice(cut).trimStart();
      if (seg) { ttsTextQueue.push(seg); processTTSPipeline(); }
    } else {
      break;
    }
  }
}

async function processTTSPipeline() {
  if (ttsIsSynthesizing) return;
  ttsIsSynthesizing = true;
  try {
    while (ttsTextQueue.length > 0) {
      const text = ttsTextQueue.shift();
      try {
        const res = await fetch('/voice/synthesize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!res.ok) continue;
        const blob = await res.blob();
        const arrayBuffer = await blob.arrayBuffer();
        const audioBuffer = await getTTSAudioContext().decodeAudioData(arrayBuffer);
        ttsAudioQueue.push({ buffer: audioBuffer });
        scheduleTTSPlayback();
      } catch (e) {}
    }
  } finally {
    ttsIsSynthesizing = false;
    if (ttsTextQueue.length > 0) processTTSPipeline();
  }
}

function scheduleTTSPlayback() {
  const ctx = getTTSAudioContext();
  while (ttsAudioQueue.length > 0) {
    const item = ttsAudioQueue[0];
    if (!item.buffer) break;
    ttsAudioQueue.shift();

    const source = ctx.createBufferSource();
    source.buffer = item.buffer;
    source.connect(ctx.destination);

    const now = ctx.currentTime;
    if (ttsNextStartTime < now) {
      ttsNextStartTime = now;
    }

    source.onended = () => {
      ttsActiveSources = ttsActiveSources.filter(s => s !== source);
      if (ttsActiveSources.length === 0) {
        ttsIsPlaying = false;
        vadLastTtsEnd = Date.now();
        if (autoPlayTargetBtn) {
          autoPlayTargetBtn.classList.remove('playing');
          autoPlayTargetBtn = null;
        }
      }
    };

    source.start(ttsNextStartTime);
    ttsNextStartTime += item.buffer.duration;
    ttsIsPlaying = true;
    ttsActiveSources.push(source);
    if (autoPlayTargetBtn) autoPlayTargetBtn.classList.add('playing');
  }
}

async function playManual(text, btnEl) {
  text = stripEmoji(text);
  if (!text) return;
  stopCurrentAudio();
  currentPlayingBtn = btnEl;
  if (btnEl) btnEl.classList.add('playing');
  try {
    const res = await fetch('/voice/synthesize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error('合成失败');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => {
      URL.revokeObjectURL(url);
      stopCurrentAudio();
    };
    currentAudio.onerror = () => {
      URL.revokeObjectURL(url);
      stopCurrentAudio();
    };
    await currentAudio.play();
  } catch (err) {
    stopCurrentAudio();
  }
}

function toggleSeamlessVoice() {
  const cb = document.getElementById('seamlessVoiceToggle');
  seamlessMode = cb.checked;
  localStorage.setItem('eva_seamless_voice', seamlessMode);
  if (seamlessMode) {
    startSeamlessVoice();
  } else {
    stopSeamlessVoice();
  }
}

async function startSeamlessVoice() {
  const btn = document.getElementById('micBtn');
  btn.classList.add('seamless');
  btn.title = '连续语音开启中，点击关闭';

  try {
    vadStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true }
    });

    // VAD audio context (for speech detection)
    vadAudioContext = new AudioContext();
    const vadSource = vadAudioContext.createMediaStreamSource(vadStream);
    vadAnalyser = vadAudioContext.createAnalyser();
    vadAnalyser.fftSize = 2048;
    vadSource.connect(vadAnalyser);

    // PCM capture audio context (for streaming to ASR)
    pcmAudioContext = new AudioContext();
    pcmSource = pcmAudioContext.createMediaStreamSource(vadStream);
    pcmProcessor = pcmAudioContext.createScriptProcessor(4096, 1, 1);
    pcmProcessor.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      const resampled = resampleLinear(input, pcmAudioContext.sampleRate, TARGET_SR);
      pcmBuffer = concatFloat32(pcmBuffer, resampled);
    };
    pcmSource.connect(pcmProcessor);
    pcmProcessor.connect(pcmAudioContext.destination);

    vadIsSpeech = false;
    vadSilenceStart = null;
    streamWs = null;
    streamPrefix = '';
    streamIsFinalizing = false;
    pcmBuffer = new Float32Array(0);
    btn.classList.add('listening');

    vadInterval = setInterval(runVAD, VAD_POLL_MS);
  } catch (err) {
    console.error('Failed to start seamless voice:', err);
    alert('无法访问麦克风: ' + (err.message || err.name));
    document.getElementById('seamlessVoiceToggle').checked = false;
    seamlessMode = false;
    btn.classList.remove('seamless', 'listening');
    btn.title = '语音输入';
  }
}

function stopSeamlessVoice() {
  const btn = document.getElementById('micBtn');
  btn.classList.remove('seamless', 'listening', 'recording');
  btn.title = '语音输入';

  if (vadInterval) {
    clearInterval(vadInterval);
    vadInterval = null;
  }
  if (pcmChunkTimer) {
    clearInterval(pcmChunkTimer);
    pcmChunkTimer = null;
  }
  if (pcmProcessor) {
    pcmProcessor.disconnect();
    pcmProcessor.onaudioprocess = null;
    pcmProcessor = null;
  }
  if (pcmSource) {
    pcmSource.disconnect();
    pcmSource = null;
  }
  if (pcmAudioContext) {
    pcmAudioContext.close();
    pcmAudioContext = null;
  }
  if (vadAudioContext) {
    vadAudioContext.close();
    vadAudioContext = null;
  }
  if (vadStream) {
    vadStream.getTracks().forEach(t => t.stop());
    vadStream = null;
  }
  vadAnalyser = null;
  vadIsSpeech = false;
  vadSilenceStart = null;
  pcmBuffer = new Float32Array(0);
  streamIsFinalizing = false;
  if (streamWs) {
    try { streamWs.close(); } catch (e) {}
    streamWs = null;
  }
  streamPrefix = '';
}

let vadLastTtsEnd = 0;
const VAD_TTS_COOLDOWN = 600;

async function runVAD() {
  if (!vadAnalyser) return;

  // Don't start recording while TTS is playing or just finished
  if (ttsIsPlaying || Date.now() - vadLastTtsEnd < VAD_TTS_COOLDOWN) {
    if (vadIsSpeech) {
      vadIsSpeech = false;
      vadSilenceStart = null;
      finalizeStream();
    }
    return;
  }

  const dataArray = new Uint8Array(vadAnalyser.fftSize);
  vadAnalyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const x = (dataArray[i] - 128) / 128.0;
    sum += x * x;
  }
  const rms = Math.sqrt(sum / dataArray.length);
  const now = Date.now();

  if (rms > VAD_THRESHOLD) {
    if (!vadIsSpeech) {
      vadIsSpeech = true;
      vadSilenceStart = null;
      // Open WebSocket for streaming ASR
      if (!streamWs) {
        try {
          const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          streamWs = new WebSocket(`${proto}//${window.location.host}/voice/stream`);
          streamPrefix = document.getElementById('input').value.trim();
          streamWs.onmessage = (evt) => {
            try {
              const msg = JSON.parse(evt.data);
              if (msg.type === 'partial') {
                const input = document.getElementById('input');
                const sep = streamPrefix && msg.text ? ' ' : '';
                input.value = streamPrefix + sep + (msg.text || '');
              }
            } catch (e) {}
          };
          streamWs.onerror = (err) => {
            console.error('ASR WebSocket error:', err);
          };
        } catch (err) {
          console.error('ASR WebSocket open error:', err);
        }
      }
      startPCMStreaming();
    } else {
      vadSilenceStart = null;
    }
  } else if (vadIsSpeech) {
    if (!vadSilenceStart) vadSilenceStart = now;
    if (now - vadSilenceStart > SILENCE_TIMEOUT) {
      vadIsSpeech = false;
      vadSilenceStart = null;
      finalizeStream();
    }
  }
}

function startPCMStreaming() {
  const chunkSamples = Math.round(TARGET_SR * (CHUNK_MS / 1000));
  pcmChunkTimer = setInterval(() => {
    if (!seamlessMode || streamIsFinalizing) return;
    while (pcmBuffer.length >= chunkSamples) {
      const chunk = pcmBuffer.slice(0, chunkSamples);
      pcmBuffer = pcmBuffer.slice(chunkSamples);
      if (streamWs && streamWs.readyState === WebSocket.OPEN) {
        try {
          streamWs.send(float32ToPCM16(chunk));
        } catch (err) {
          console.error('WebSocket send error:', err);
        }
      }
    }
  }, CHUNK_MS / 2);
}

async function finalizeStream() {
  if (streamIsFinalizing) return;
  streamIsFinalizing = true;

  if (pcmChunkTimer) {
    clearInterval(pcmChunkTimer);
    pcmChunkTimer = null;
  }

  // Flush remaining audio
  if (pcmBuffer.length > 0 && streamWs && streamWs.readyState === WebSocket.OPEN) {
    try {
      streamWs.send(float32ToPCM16(new Float32Array(pcmBuffer)));
    } catch (err) {
      console.error('WebSocket flush error:', err);
    }
    pcmBuffer = new Float32Array(0);
  }

  // Request final transcription and wait for result
  let finalText = '';
  if (streamWs && streamWs.readyState === WebSocket.OPEN) {
    try {
      finalText = await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('Final transcription timeout')), 10000);
        const onMessage = (evt) => {
          try {
            const msg = JSON.parse(evt.data);
            if (msg.type === 'final') {
              clearTimeout(timeout);
              streamWs.removeEventListener('message', onMessage);
              resolve(msg.text || '');
            } else if (msg.type === 'error') {
              clearTimeout(timeout);
              streamWs.removeEventListener('message', onMessage);
              reject(new Error(msg.message));
            }
          } catch (e) {}
        };
        streamWs.addEventListener('message', onMessage);
        streamWs.send('final');
      });
    } catch (err) {
      console.error('ASR final error:', err);
    }
    try { streamWs.close(); } catch (e) {}
    streamWs = null;
  }

  // Update input with the final text
  const input = document.getElementById('input');
  const sep = streamPrefix && finalText ? ' ' : '';
  input.value = streamPrefix + sep + finalText;

  if (vadIsSpeech) return;

  const text = input.value.trim();
  if (text && !isStreaming) {
    sendMessage();
  }

  // Reset state for next utterance
  streamPrefix = '';
  streamIsFinalizing = false;
}

async function toggleRecording() {
  const btn = document.getElementById('micBtn');

  // If seamless mode is active, clicking mic turns it off
  if (seamlessMode) {
    document.getElementById('seamlessVoiceToggle').checked = false;
    toggleSeamlessVoice();
    return;
  }

  if (isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    btn.classList.remove('recording');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true }
    });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : (MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '');
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      if (audioChunks.length === 0) return;
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      const formData = new FormData();
      formData.append('audio', blob, 'recording.webm');

      const input = document.getElementById('input');
      input.placeholder = '识别中...';
      try {
        const res = await fetch('/voice/transcribe', { method: 'POST', body: formData });
        if (!res.ok) throw new Error('识别失败');
        const data = await res.json();
        input.value = data.text || '';
      } catch (err) {
        input.placeholder = '识别出错，请重试';
        setTimeout(() => { input.placeholder = '说点什么...'; }, 2000);
      }
    };

    mediaRecorder.start();
    isRecording = true;
    btn.classList.add('recording');
  } catch (err) {
    console.error('麦克风错误:', err.name, err.message);
    alert('无法访问麦克风: ' + (err.message || err.name || '请检查权限设置'));
  }
}

function saveAutoPlaySetting() {
  const toggle = document.getElementById('autoPlayToggle');
  localStorage.setItem('eva_auto_play', toggle.checked);
}

function loadAutoPlaySetting() {
  const toggle = document.getElementById('autoPlayToggle');
  toggle.checked = localStorage.getItem('eva_auto_play') === 'true';
}

function loadSeamlessVoiceSetting() {
  const toggle = document.getElementById('seamlessVoiceToggle');
  const saved = localStorage.getItem('eva_seamless_voice') === 'true';
  toggle.checked = saved;
  if (saved) toggleSeamlessVoice();
}

// Welcome message
appendMessage('assistant', '嗨，我是小夏。想聊点什么？');
loadAutoPlaySetting();
loadSeamlessVoiceSetting();
