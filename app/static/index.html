<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eva - 虚拟情感陪伴助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f5f5;
  height: 100vh;
  height: 100dvh;
  display: flex;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #fff;
  border-right: 1px solid #e0e0e0;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid #e0e0e0;
}
.sidebar-header h1 {
  font-size: 18px;
  color: #333;
}
.sidebar-header p {
  font-size: 12px;
  color: #999;
  margin-top: 4px;
}
.nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.nav-item {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 14px;
  color: #555;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.nav-item:hover {
  background: #f0f0f0;
}
.nav-item.active {
  background: #e8f4fd;
  border-left-color: #2196F3;
  color: #1976D2;
}
.nav-item .label {
  font-size: 12px;
  color: #999;
  margin-top: 2px;
}
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid #e0e0e0;
  font-size: 12px;
  color: #999;
}

/* Main chat area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.chat-header {
  padding: 12px 20px;
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.chat-header .title {
  font-size: 15px;
  font-weight: 500;
  color: #333;
}
.chat-header .tone-badge {
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 12px;
  background: #e3f2fd;
  color: #1976D2;
  white-space: nowrap;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.message {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user {
  align-self: flex-end;
  background: #2196F3;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant {
  align-self: flex-start;
  background: #fff;
  color: #333;
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}
.message.assistant.streaming {
  background: #fafafa;
}
.input-area {
  padding: 12px 20px 16px;
  background: #fff;
  border-top: 1px solid #e0e0e0;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.input-area textarea {
  flex: 1;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  resize: none;
  outline: none;
  font-family: inherit;
  line-height: 1.5;
  max-height: 120px;
}
.input-area textarea:focus {
  border-color: #2196F3;
}
.input-area button {
  padding: 10px 20px;
  background: #2196F3;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.input-area button:hover {
  background: #1976D2;
}
.input-area button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

/* Memories panel */
.memories-panel {
  width: 280px;
  background: #fff;
  border-left: 1px solid #e0e0e0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.memories-panel.hidden {
  display: none;
}
.memories-header {
  padding: 12px 16px;
  border-bottom: 1px solid #e0e0e0;
  font-size: 15px;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.memories-header button {
  font-size: 12px;
  background: none;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 2px 8px;
  cursor: pointer;
  color: #666;
}
.memories-header button:hover {
  background: #f0f0f0;
}
.memories-header .danger-btn {
  color: #e53935;
  border-color: #ef9a9a;
}
.memories-header .danger-btn:hover {
  background: #ffebee;
}

/* Confirm dialog */
.dialog-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.dialog-overlay.active {
  display: flex;
}
.dialog-box {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 360px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.dialog-box h3 {
  font-size: 16px;
  margin-bottom: 8px;
  color: #333;
}
.dialog-box p {
  font-size: 14px;
  color: #666;
  line-height: 1.5;
  margin-bottom: 20px;
}
.dialog-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.dialog-actions button {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  border: none;
}
.dialog-actions .btn-cancel {
  background: #f0f0f0;
  color: #555;
}
.dialog-actions .btn-confirm {
  background: #e53935;
  color: #fff;
}
.memories-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.memory-item {
  padding: 8px 16px;
  font-size: 13px;
  color: #555;
  border-bottom: 1px solid #f0f0f0;
}
.memory-item .fact {
  color: #333;
}
.memory-item .meta {
  font-size: 11px;
  color: #999;
  margin-top: 2px;
}
.empty-state {
  text-align: center;
  color: #999;
  font-size: 13px;
  padding: 40px 20px;
}
.toggle-btn {
  font-size: 12px;
  background: none;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 4px 10px;
  cursor: pointer;
  color: #666;
}

/* Hamburger menu (hidden on desktop) */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 4px;
  padding: 6px;
  cursor: pointer;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: #666;
  border-radius: 1px;
}

/* Sidebar overlay on mobile */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
}
.sidebar-overlay.active {
  display: block;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 101;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    box-shadow: 2px 0 8px rgba(0,0,0,0.1);
  }
  .sidebar.open {
    transform: translateX(0);
  }

  .hamburger {
    display: flex;
  }

  .chat-header {
    padding: 10px 12px;
  }
  .chat-header .title {
    font-size: 14px;
  }

  .messages {
    padding: 12px;
    gap: 10px;
  }
  .message {
    max-width: 82%;
    padding: 8px 12px;
    font-size: 15px;
    line-height: 1.55;
  }

  .input-area {
    padding: 8px 12px 12px;
    gap: 8px;
  }
  .input-area textarea {
    padding: 8px 10px;
    font-size: 15px;
  }
  .input-area button {
    padding: 8px 14px;
    font-size: 14px;
  }

  .memories-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    z-index: 102;
    width: 80%;
    max-width: 300px;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    box-shadow: -2px 0 8px rgba(0,0,0,0.1);
  }
  .memories-panel.open {
    transform: translateX(0);
  }
  .memories-panel.hidden {
    display: flex;
  }

  .sidebar-footer {
    display: none;
  }
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Eva</h1>
    <p>虚拟情感陪伴助手</p>
  </div>
  <div class="nav">
    <div class="nav-item active" onclick="switchTab('chat')">
      对话
      <div class="label">开始新对话</div>
    </div>
    <div class="nav-item" onclick="switchTab('memories')">
      记忆
      <div class="label">AI 记住的事</div>
    </div>
  </div>
  <div class="sidebar-footer">
    快捷键: Enter 发送, Shift+Enter 换行
  </div>
</div>

<div class="main">
  <div class="chat-header">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="hamburger" onclick="openSidebar()">
        <span></span><span></span><span></span>
      </button>
      <span class="title">小夏</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="tone-badge" id="toneBadge" style="display:none">默认</span>
      <button class="toggle-btn" onclick="toggleMemories()">记忆</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" rows="2" placeholder="说点什么..." onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<div class="memories-panel hidden" id="memoriesPanel">
  <div class="memories-header">
    长期记忆
    <div style="display:flex;gap:6px">
      <button onclick="refreshMemories()">刷新</button>
      <button class="danger-btn" onclick="confirmClearMemories()">清除全部</button>
    </div>
  </div>
  <div class="memories-list" id="memoriesList">
    <div class="empty-state">暂无记忆</div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="dialog-overlay" id="confirmDialog">
  <div class="dialog-box">
    <h3>清除全部记忆？</h3>
    <p>这会把 AI 记住的所有关于你的事都删掉，无法恢复。确定吗？</p>
    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeConfirmDialog()">取消</button>
      <button class="btn-confirm" onclick="doClearMemories()">确定清除</button>
    </div>
  </div>
</div>

<script>
let sessionId = null;
let isStreaming = false;

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  closeSidebar();
  if (tab === 'memories') {
    toggleMemories();
  }
}

function toggleMemories() {
  const panel = document.getElementById('memoriesPanel');
  panel.classList.toggle('hidden');
  panel.classList.toggle('open');
  refreshMemories();
}

function appendMessage(role, content) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = content;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function updateStreamingMessage(el, content) {
  el.textContent = content;
  const container = document.getElementById('messages');
  container.scrollTop = container.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  appendMessage('user', text);
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const assistantEl = appendMessage('assistant streaming', '');
  let fullReply = '';

  try {
    const res = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'token') {
            fullReply += data.data;
            updateStreamingMessage(assistantEl, fullReply);
          } else if (data.type === 'done') {
            sessionId = data.session_id;
            const badge = document.getElementById('toneBadge');
            badge.textContent = data.tone_detected || '默认';
            badge.style.display = 'inline';
            assistantEl.classList.remove('streaming');
            refreshMemories();
          }
        } catch (e) {}
      }
    }
  } catch (err) {
    assistantEl.textContent = '出错啦，请重试';
    assistantEl.classList.remove('streaming');
  }

  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
}

async function refreshMemories() {
  try {
    const res = await fetch('/memories');
    const memories = await res.json();
    const container = document.getElementById('memoriesList');
    if (memories.length === 0) {
      container.innerHTML = '<div class="empty-state">暂无记忆</div>';
      return;
    }
    container.innerHTML = memories.map(m => `
      <div class="memory-item">
        <div class="fact">${m.fact_text}</div>
        <div class="meta">${m.category} · ${new Date(m.created_at).toLocaleString()}</div>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('memoriesList').innerHTML = '<div class="empty-state">加载失败</div>';
  }
}

function confirmClearMemories() {
  document.getElementById('confirmDialog').classList.add('active');
}

function closeConfirmDialog() {
  document.getElementById('confirmDialog').classList.remove('active');
}

async function doClearMemories() {
  closeConfirmDialog();
  try {
    const res = await fetch('/memories', { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
      refreshMemories();
    }
  } catch (err) {
    alert('清除失败，请重试');
  }
}

// Welcome message
appendMessage('assistant', '嗨，我是小夏。想聊点什么？');
</script>
</body>
</html>
